<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Agendamento de Consulta</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .caixa-principal {
            max-width: 1000px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        }

        .titulo-principal {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            color: #1f2937;
        }

        .secao {
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            background-color: #fafafa;
        }

        .secao h3 {
            margin-bottom: 20px;
            color: #0d6efd;
            font-weight: 600;
        }

        .texto-ajuda {
            font-size: 0.9rem;
            color: #6c757d;
        }

        textarea {
            resize: vertical;
            min-height: 110px;
        }
    </style>
</head>

<body>

    <div class="container caixa-principal">

        <h1 class="titulo-principal">Agendamento de Consulta</h1>

        {{#erros}}
        <div class="alert alert-danger" role="alert">
            {{mensagem}}
        </div>
        {{/erros}}

        <form action="/agendamento" method="post">

            <div class="secao">
                <h3>Dados do paciente</h3>

                <div class="row">
                    <div class="col-md-6 mt-2">
                        <label for="nome" class="form-label">Nome:</label>
                        <input type="text" id="nome" name="nome" class="form-control" value="{{dados.nome}}">
                    </div>

                    <div class="col-md-6 mt-2">
                        <label for="sobrenome" class="form-label">Sobrenome:</label>
                        <input type="text" id="sobrenome" name="sobrenome" class="form-control" value="{{dados.sobrenome}}">
                    </div>

                    <div class="col-md-6 mt-2">
                        <label for="cpf" class="form-label">CPF:</label>
                        <input type="text" id="cpf" name="cpf" class="form-control" placeholder="000.000.000-00" value="{{dados.cpf}}">
                    </div>

                    <div class="col-md-6 mt-2">
                        <label for="data_nascimento" class="form-label">Data de nascimento:</label>
                        <input type="date" id="data_nascimento" name="data_nascimento" class="form-control" value="{{dados.data_nascimento}}">
                    </div>

                    <div class="col-md-6 mt-2">
                        <label for="telefone" class="form-label">Telefone:</label>
                        <input type="text" id="telefone" name="telefone" class="form-control" placeholder="(61) 99999-9999" value="{{dados.telefone}}">
                    </div>

                    <div class="col-md-6 mt-2">
                        <label for="cep" class="form-label">CEP:</label>
                        <input type="text" id="cep" name="cep" class="form-control" placeholder="70000-000" value="{{dados.cep}}">
                    </div>

                    <div class="col-md-12 mt-2">
                        <label for="endereco" class="form-label">Endereço:</label>
                        <input type="text" id="endereco" name="endereco" class="form-control" placeholder="Rua, número, bairro e cidade" value="{{dados.endereco}}">
                    </div>
                </div>
            </div>

            <div class="secao">
                <h3>Dados da consulta</h3>

                <div class="row">
                    <div class="col-md-6 mt-2">
                        <label for="clinica" class="form-label">Clínica:</label>
                        <input type="text" id="clinica" name="clinica" class="form-control" placeholder="Ex: Clínica Saúde Mais" value="{{dados.clinica}}">
                    </div>

                    <div class="col-md-6 mt-2">
                        <label for="especialidade" class="form-label">Especialidade:</label>
                        <input type="text" id="especialidade" name="especialidade" class="form-control" placeholder="Ex: Cardiologia" value="{{dados.especialidade}}">
                    </div>

                    <div class="col-md-12 mt-2">
                        <label for="data_hora_agendamento" class="form-label">Data e hora do agendamento:</label>
                        <input type="datetime-local" id="data_hora_agendamento" name="data_hora_agendamento" class="form-control" value="{{dados.data_hora_agendamento}}">
                        <div class="texto-ajuda mt-1">
                            A data e hora devem ser posteriores ao momento atual.
                        </div>
                    </div>

                    <div class="col-md-12 mt-2">
                        <label for="observacao" class="form-label">Observação:</label>
                        <textarea id="observacao" name="observacao" class="form-control" placeholder="Digite uma observação, se necessário">{{dados.observacao}}</textarea>
                        <div class="texto-ajuda mt-1">
                            Este campo é opcional.
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-12">
                    <button type="submit" class="btn btn-primary w-100 btn-lg">Enviar</button>
                </div>
            </div>

        </form>

    </div>

</body>

</html>
